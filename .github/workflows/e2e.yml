name: E2E

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  examples:
    name: examples (${{ matrix.node-version }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [22.x, 24.x, 25.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install e2e fixture dependencies
        run: |
          for fixture in e2e/*/; do
            if [ -f "$fixture/package.json" ]; then
              (cd "$fixture" && pnpm install --frozen-lockfile)
            fi
          done

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e
